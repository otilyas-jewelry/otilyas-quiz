<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>איזו תנועה מייצגת אותך? · Which movement is yours? — OTILYAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500&family=Playpen+Sans+Hebrew:wght@300;400&family=Playpen+Sans:wght@300;400&family=Parisienne&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf8f3;
    --ink:#171512;
    --muted:#6f6a5f;
    --hair:#d9d3c6;
    --soft:#4d483f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Assistant',-apple-system,'Segoe UI',sans-serif;
    font-weight:300;
    font-size:18px;
    letter-spacing:.015em;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:22px 14px;
    -webkit-font-smoothing:antialiased;
  }
  /* וידאו רקע — נוכחות עדינה מאוד של תנועה */
  .bg-video{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    opacity:.09;
    filter:grayscale(35%);
    pointer-events:none;
    z-index:0;
  }
  /* מסגרת פספרטו — כמו כרטיס תערוכה */
  .mat{
    position:relative;
    z-index:1;
    width:100%;
    max-width:680px;
    border:1px solid var(--ink);
    padding:7px;
    background:transparent;
  }
  .frame{
    border:1px solid var(--hair);
    padding:0 clamp(22px,6vw,58px) 56px;
    display:flex;
    flex-direction:column;
    min-height:calc(100vh - 60px);
  }

  /* כפתור מוזיקה — קו מתפתל שזז עם המוזיקה + חיווי */
  .music-dock{position:fixed;bottom:22px;inset-inline-start:22px;z-index:6;display:flex;align-items:center;gap:11px;}
  .music-btn{border:none;background:none;cursor:pointer;padding:0;width:70px;height:28px;opacity:.7;transition:opacity .4s;}
  .music-btn:hover{opacity:1;}
  .music-btn.on{opacity:.95;}
  .music-btn canvas{display:block;width:70px;height:28px;}
  .music-hint{font-size:12px;letter-spacing:.1em;color:var(--muted);white-space:nowrap;animation:hintpulse 2.6s ease-in-out infinite;transition:opacity .7s;}
  .music-hint.gone{opacity:0;}
  @keyframes hintpulse{0%,100%{opacity:.4;}50%{opacity:.85;}}

  /* ---- בורר שפה ---- */
  .langtoggle{
    text-align:center;
    padding:22px 0 0;
    letter-spacing:.02em;
  }
  .langtoggle button{
    background:none;border:none;cursor:pointer;
    font-family:'Assistant',sans-serif;
    font-size:14px;font-weight:400;
    color:var(--muted);
    padding:4px 6px;
    transition:color .3s;
  }
  .langtoggle button.active{color:var(--ink);border-bottom:1px solid var(--ink);}
  .langtoggle .sep{color:var(--hair);margin:0 4px;}

  .brand{
    text-align:center;
    letter-spacing:.6em;
    text-indent:.6em;
    font-size:16px;
    font-weight:400;
    padding:30px 0 14px;
  }
  .brand-sub{
    text-align:center;
    font-family:'Fira Code',monospace;
    font-weight:300;
    font-size:11px;
    letter-spacing:.3em;
    text-indent:.3em;
    color:var(--muted);
    padding-bottom:44px;
  }
  /* כתב יד — הנגיעה האישית (עברית ואנגלית) */
  .hand{font-family:'Playpen Sans Hebrew',cursive;font-weight:300;}
  html[lang="en"] .hand{font-family:'Playpen Sans','Playpen Sans Hebrew',cursive;}
  .screen{display:none;animation:rise .8s cubic-bezier(.2,.7,.2,1) both;}
  .screen.on{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

  /* ---- פתיחה ---- */
  .intro{text-align:center;padding-top:6vh;}
  .intro .kicker{font-size:14px;color:var(--muted);letter-spacing:.14em;margin-bottom:26px;animation:rise .8s .15s both;}
  .intro h1{
    font-size:clamp(38px,8.5vw,57px);
    font-weight:200;
    letter-spacing:.03em;
    line-height:1.35;
    animation:rise .8s .3s both;
  }
  .intro .sub{
    font-size:clamp(18px,4.3vw,21px);
    line-height:2.1;
    color:var(--soft);
    margin:30px auto 0;
    max-width:440px;
    animation:rise .8s .6s both;
  }
  .hairline{width:64px;height:1px;background:var(--ink);opacity:.35;margin:40px auto;animation:rise .8s .6s both;}
  .btn{
    display:inline-block;
    font-family:inherit;
    font-size:16px;
    font-weight:400;
    letter-spacing:.16em;
    color:var(--paper);
    background:linear-gradient(180deg,#8c8578 0%,#6f6a5f 100%);
    border:1px solid #6a6559;
    border-radius:3px;
    padding:18px 62px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(77,72,63,.28), inset 0 1px 0 rgba(255,255,255,.22);
    transition:transform .28s cubic-bezier(.2,.7,.2,1),box-shadow .35s,filter .35s;
    animation:rise .8s .7s both;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 9px 22px rgba(77,72,63,.34), inset 0 1px 0 rgba(255,255,255,.25);filter:brightness(1.04);}
  .btn:active{transform:translateY(0);box-shadow:0 3px 9px rgba(77,72,63,.26), inset 0 1px 0 rgba(255,255,255,.18);}
  .note{font-size:14px;color:var(--muted);margin-top:26px;animation:rise .8s .85s both;}
  .link-soft{
    display:inline-block;
    background:none;border:none;
    font-family:inherit;font-size:14px;font-weight:300;
    letter-spacing:.05em;color:var(--muted);
    text-decoration:none;cursor:pointer;
    margin-top:30px;
    border-bottom:1px solid var(--hair);
    padding-bottom:3px;
    transition:color .3s,border-color .3s;
    animation:rise .8s .95s both;
  }
  .link-soft:hover{color:var(--ink);border-color:var(--ink);}

  /* ---- עליי ---- */
  .about{text-align:center;padding-top:6vh;}
  .about .kicker{font-size:14px;color:var(--muted);letter-spacing:.22em;margin-bottom:34px;animation:rise .8s .1s both;}
  .about-text{
    font-size:clamp(18px,4.3vw,21px);
    line-height:2.15;
    color:var(--soft);
    max-width:440px;
    margin:0 auto;
    animation:rise .8s .3s both;
  }
  .about-text .hand{color:var(--ink);}
  .about-name{
    display:block;
    font-family:'Assistant',sans-serif;
    font-weight:200;
    font-size:clamp(30px,7vw,42px);
    letter-spacing:.03em;
    color:var(--ink);
    margin-bottom:14px;
  }
  .about-choice{
    font-size:clamp(17px,4.1vw,20px);
    line-height:2.05;
    color:var(--soft);
    max-width:440px;
    margin:34px auto 0;
    animation:rise .8s .58s both;
  }
  .signature{
    font-family:'Parisienne',cursive;
    font-size:clamp(46px,11vw,66px);
    line-height:1;
    color:var(--ink);
    margin-top:34px;
    animation:rise .8s .68s both;
  }
  .about-creed{
    font-size:clamp(19px,4.6vw,23px);
    line-height:1.9;
    color:var(--ink);
    max-width:440px;
    margin:38px auto 0;
    padding-top:34px;
    border-top:1px solid var(--hair);
    animation:rise .8s .5s both;
  }
  .about-sign{
    letter-spacing:.4em;text-indent:.4em;
    font-size:13px;font-weight:400;color:var(--muted);
    margin-top:8px;
    animation:rise .8s .74s both;
  }
  .about .hairline{animation:rise .8s .8s both;}
  .about .btn{animation:rise .8s .88s both;}

  /* ---- שאלון ---- */
  .progress{display:flex;align-items:center;gap:16px;margin:30px 0 44px;}
  .progress .num{
    font-family:'Fira Code',monospace;
    font-weight:400;
    font-size:14px;
    color:var(--muted);
    letter-spacing:.1em;
    white-space:nowrap;
  }
  .progress .track{flex:1;height:1px;background:var(--hair);position:relative;}
  .progress .fill{position:absolute;top:0;inset-inline-start:0;height:1px;background:var(--ink);transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .q{
    font-size:clamp(27px,6.2vw,34px);
    font-weight:200;
    letter-spacing:.03em;
    line-height:1.5;
    margin-bottom:38px;
  }
  .opts{display:flex;flex-direction:column;gap:12px;}
  .opt{
    font-family:inherit;
    font-size:18px;
    font-weight:400;
    text-align:start;
    line-height:1.75;
    background:transparent;
    border:1px solid var(--hair);
    color:var(--ink);
    padding:18px 22px;
    cursor:pointer;
    transition:border-color .3s,background .3s,color .3s;
  }
  .opt:hover{border-color:var(--ink);}
  .opt.picked{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .backwrap{text-align:center;margin-top:26px;}
  .back-btn{
    background:none;border:none;cursor:pointer;
    font-family:inherit;font-size:14px;font-weight:300;
    letter-spacing:.08em;color:var(--muted);
    padding-bottom:3px;border-bottom:1px solid var(--hair);
    transition:color .3s,border-color .3s;
  }
  .back-btn:hover{color:var(--ink);border-color:var(--ink);}

  /* ---- תוצאה — כרטיס תערוכה ---- */
  .result .kicker{font-size:15px;letter-spacing:.14em;color:var(--muted);margin:34px 0 12px;animation:rise .8s .1s both;}
  .result h2{
    font-size:clamp(42px,9.5vw,61px);
    font-weight:200;
    letter-spacing:.04em;
    line-height:1.3;
    animation:rise .8s .25s both;
  }
  .result .words{
    font-family:'Fira Code',monospace;
    font-weight:300;
    font-size:13.5px;
    letter-spacing:.18em;
    color:var(--muted);
    margin:14px 0 42px;
    animation:rise .8s .4s both;
  }
  .result .story{font-size:clamp(18px,4.3vw,21px);line-height:2.15;animation:rise .8s .55s both;}
  .result .song{
    border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);
    margin:42px 0;padding:34px 6px;
    font-family:'Playpen Sans Hebrew',cursive;
    font-weight:300;color:var(--soft);
    font-size:clamp(16px,4vw,19px);line-height:2.1;
    animation:rise .8s .7s both;
  }
  html[lang="en"] .result .song{font-family:'Playpen Sans','Playpen Sans Hebrew',cursive;}
  .result .song .credit{display:block;font-family:'Assistant',sans-serif;font-weight:300;letter-spacing:.1em;font-size:14px;color:var(--muted);margin-top:14px;}
  .result .models{animation:rise .8s .8s both;}
  .result .models b{font-weight:400;letter-spacing:.1em;font-size:15px;display:block;margin-bottom:10px;}
  .result .models span{
    font-family:'Fira Code',monospace;
    font-weight:300;
    font-size:13.5px;
    letter-spacing:.06em;
    line-height:2.1;
    color:var(--soft);
  }

  /* ---- טופס ---- */
  .invite{margin-top:48px;border:1px solid var(--ink);padding:7px;animation:rise .8s .9s both;}
  .invite-inner{border:1px solid var(--hair);padding:32px 26px;}
  .invite p{font-size:18px;font-weight:400;line-height:1.9;margin-bottom:24px;}
  .field{
    width:100%;font-family:inherit;font-size:18px;font-weight:400;
    background:transparent;border:none;border-bottom:1px solid var(--hair);
    padding:14px 2px;margin-bottom:20px;color:var(--ink);border-radius:0;
    text-align:start;
  }
  .field:focus{outline:none;border-bottom-color:var(--ink);}
  .field::placeholder{color:var(--muted);}
  .invite .btn{width:100%;animation:none;}
  .form-note{font-size:14.5px;color:var(--muted);margin-top:16px;line-height:1.8;}
  .err{font-size:16px;color:#8c3b2e;margin-top:14px;display:none;}

  /* ---- סיום ---- */
  .done{text-align:center;padding-top:10vh;}
  .done h2{font-size:clamp(30px,7vw,42px);font-weight:200;letter-spacing:.04em;line-height:1.45;animation:rise .8s .2s both;}
  .done p{font-size:19px;color:var(--soft);line-height:2.1;margin-top:24px;animation:rise .8s .4s both;}
  .again{background:none;border:none;font-family:inherit;font-size:16px;color:var(--muted);text-decoration:underline;cursor:pointer;animation:rise .8s .7s both;}

  .foot{
    margin-top:auto;
    text-align:center;
    padding-top:56px;
    font-size:16px;
    font-weight:500;
    letter-spacing:.25em;
    text-indent:.25em;
  }
  .foot .pilot{
    display:block;
    font-family:'Fira Code',monospace;
    font-weight:300;
    letter-spacing:.15em;
    font-size:10.5px;
    color:var(--muted);
    margin-top:10px;
  }
</style>
</head>
<body>
<video class="bg-video" src="assets/quiz-intro.mp4" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
<div class="music-dock">
  <button id="musicBtn" class="music-btn on" aria-label="מוזיקה" onclick="toggleMusic()"><canvas id="musicWave" width="140" height="56"></canvas></button>
  <span id="musicHint" class="music-hint"></span>
</div>
<div class="mat"><div class="frame">

  <div class="langtoggle">
    <button id="langHe" onclick="setLang('he')">עברית</button>
    <span class="sep">·</span>
    <button id="langEn" onclick="setLang('en')">English</button>
  </div>

  <div class="brand">OTILYAS</div>
  <div class="brand-sub">HANDMADE · TEL AVIV</div>

  <!-- פתיחה -->
  <section id="intro" class="screen on intro">
    <div class="kicker" id="introKicker"></div>
    <h1 id="introH1"></h1>
    <p class="sub" id="introSub"></p>
    <div class="hairline"></div>
    <button class="btn" id="startBtn" onclick="startQuiz()"></button>
    <div class="note" id="introNote"></div>
    <button class="link-soft" id="aboutLink" onclick="show('about')"></button>
  </section>

  <!-- עליי -->
  <section id="about" class="screen about">
    <div class="kicker" id="aboutKicker"></div>
    <p class="about-text" id="aboutText"></p>
    <p class="about-creed hand" id="aboutCreed"></p>
    <p class="about-choice" id="aboutChoice"></p>
    <div class="signature">Tali</div>
    <div class="about-sign">OTILYAS.</div>
    <div class="hairline"></div>
    <button class="btn" id="aboutBtn" onclick="show('intro')"></button>
    <a class="link-soft" id="siteLink" href="https://otilyas.com" target="_blank" rel="noopener"></a>
  </section>

  <!-- שאלון -->
  <section id="quiz" class="screen">
    <div class="progress">
      <span class="num" id="qnum">№ 1 / 5</span>
      <div class="track"><div class="fill" id="qfill" style="width:0%"></div></div>
    </div>
    <div id="qbody"></div>
  </section>

  <!-- תוצאה -->
  <section id="result" class="screen result">
    <div class="kicker" id="resultKicker"></div>
    <h2 id="rname"></h2>
    <div class="words" id="rwords"></div>
    <div class="story" id="rstory"></div>
    <div class="song"><span id="rsong"></span><span class="credit" id="songCredit"></span></div>
    <div class="models"><b id="modelsLabel"></b><span id="rmodels"></span></div>
    <div class="invite"><div class="invite-inner">
      <p id="inviteP"></p>
      <form id="subform" onsubmit="return subscribe(event)">
        <input class="field" type="text" id="fname" autocomplete="given-name">
        <input class="field" type="email" id="femail" required autocomplete="email">
        <button class="btn" type="submit" id="sendbtn"></button>
        <div class="err" id="formerr"></div>
        <div class="form-note" id="formNote"></div>
      </form>
    </div></div>
  </section>

  <!-- סיום -->
  <section id="done" class="screen done">
    <h2 id="doneH2"></h2>
    <p id="doneP"></p>
    <div class="hairline"></div>
    <button class="again" id="againBtn" onclick="location.reload()"></button>
  </section>

  <div class="foot"><a href="https://otilyas.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">OTILYAS.</a><span class="pilot">PILOT EDITION — № 001</span></div>
</div></div>

function setText(id, html){ const el = document.getElementById(id); if (el) el.innerHTML = html; }

function applyLang(lang){
  LANG = lang;
  const t = T[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  // בורר
  document.getElementById('langHe').classList.toggle('active', lang==='he');
  document.getElementById('langEn').classList.toggle('active', lang==='en');

  setText('introKicker', t.introKicker);
  setText('introH1', t.introH1);
  setText('introSub', t.introSub);
  setText('startBtn', t.startBtn);
  setText('introNote', t.introNote);
  setText('aboutLink', t.aboutLink);
  // עליי
  setText('aboutKicker', t.aboutKicker);
  setText('aboutText', t.aboutText);
  setText('aboutCreed', t.aboutCreed);
  setText('aboutChoice', t.aboutChoice);
  setText('aboutBtn', t.aboutBtn);
  setText('siteLink', t.siteLink);
  // תוצאה + טופס (טקסטים קבועים)
  setText('resultKicker', t.resultKicker);
  setText('songCredit', t.songCredit);
  setText('modelsLabel', t.modelsLabel);
  setText('inviteP', t.inviteP);
  setText('formNote', t.formNote);
  document.getElementById('fname').placeholder = t.phName;
  document.getElementById('femail').placeholder = t.phEmail;
  document.getElementById('sendbtn').textContent = t.sendBtn;
  document.getElementById('formerr').textContent = t.formErr;
  // סיום
  setText('doneH2', t.doneH2);
  setText('doneP', t.doneP);
  setText('againBtn', t.againBtn);
  setText('musicHint', t.musicHint);
  // רענון תוכן דינמי אם מוצג
  if (document.getElementById('quiz').classList.contains('on')) renderQuestion();
  if (document.getElementById('result').classList.contains('on') && resultKey) fillResult();
}

function setLang(lang){ applyLang(lang); }

function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  const el = document.getElementById(id);
  el.classList.remove('on');
  void el.offsetWidth;
  el.classList.add('on');
  window.scrollTo({top:0, behavior:'smooth'});
}

function startQuiz(){ current = 0; answers.length = 0; renderQuestion(); show('quiz'); }

function renderQuestion(){
  const item = T[LANG].questions[current];
  document.getElementById('qnum').textContent = '№ ' + (current+1) + ' / ' + T[LANG].questions.length;
  document.getElementById('qfill').style.width = ((current) / T[LANG].questions.length * 100) + '%';
  const shuffled = item.opts.map((o)=>({o, r:Math.random()})).sort((a,b)=>a.r-b.r).map(x=>x.o);
  const body = document.getElementById('qbody');
  body.innerHTML = '<div class="q">' + item.q + '</div><div class="opts">' +
    shuffled.map(o => '<button class="opt" data-t="' + o[1] + '">' + o[0] + '</button>').join('') + '</div>' +
    (current > 0 ? '<div class="backwrap"><button class="back-btn" onclick="goBack()">' + T[LANG].backBtn + '</button></div>' : '');
  body.querySelectorAll('.opt').forEach(btn => btn.addEventListener('click', () => pick(btn)));
}

function pick(btn){
  btn.classList.add('picked');
  scores[btn.dataset.t]++;
  answers[current] = btn.dataset.t;
  document.getElementById('qfill').style.width = ((current+1) / T[LANG].questions.length * 100) + '%';
  setTimeout(() => {
    current++;
    if (current < T[LANG].questions.length) renderQuestion();
    else showResult();
  }, 420);
}

function goBack(){
  if (current === 0) return;
  current--;
  const prev = answers[current];
  if (prev){ scores[prev]--; answers[current] = null; }
  renderQuestion();
}

function fillResult(){
  const r = T[LANG].results[resultKey];
  document.getElementById('rname').textContent = r.name;
  document.getElementById('rwords').textContent = r.words;
  document.getElementById('rstory').innerHTML = r.story;
  document.getElementById('rsong').textContent = r.song;
  document.getElementById('rmodels').textContent = r.models;
}

function showResult(){
  resultKey = Object.keys(scores).reduce((a,b) => scores[b] > scores[a] ? b : a);
  fillResult();
  show('result');
}

async function subscribe(ev){
  ev.preventDefault();
  const btn = document.getElementById('sendbtn');
  const err = document.getElementById('formerr');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = T[LANG].sendingBtn;
  const payload = {
    data: {
      type: 'subscription',
      attributes: {
        custom_source: 'שאלון הטמפרמנט — פיילוט',
        profile: {
          data: {
            type: 'profile',
            attributes: {
              email: document.getElementById('femail').value.trim(),
              first_name: document.getElementById('fname').value.trim(),
              properties: {
                temperament: CANON[resultKey],
                temperament_key: resultKey,
                quiz_lang: LANG,
                quiz_source: 'pilot-2026-07'
              }
            }
          }
        }
      },
      relationships: { list: { data: { type: 'list', id: KLAVIYO_LIST_ID } } }
    }
  };
  try {
    const res = await fetch('https://a.klaviyo.com/client/subscriptions/?company_id=' + KLAVIYO_COMPANY_ID, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'revision': '2025-04-15' },
      body: JSON.stringify(payload)
    });
    if (res.status === 202) { show('done'); return false; }
    throw new Error('status ' + res.status);
  } catch (e) {
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = T[LANG].sendBtn;
  }
  return false;
}

  {b:32,f:N.C5,d:1},{b:33,f:N.D5,d:1},{b:34,f:N.E5,d:1},{b:35,f:N.F5,d:1},
  {b:36,f:N.E5,d:2},{b:38,f:N.G5,d:1},{b:39,f:N.E5,d:1},
  {b:40,f:N.D5,d:1.5},{b:41.5,f:N.E5,d:0.5},{b:42,f:N.D5,d:1},{b:43,f:N.B4,d:1},
  {b:44,f:N.C5,d:2},{b:46,f:N.A4,d:2},
  {b:48,f:N.A4,d:1},{b:49,f:N.C5,d:1},{b:50,f:N.F5,d:1},{b:51,f:N.E5,d:1},
  {b:52,f:N.E5,d:2},{b:54,f:N.D5,d:1},{b:55,f:N.C5,d:1},
  {b:56,f:N.D5,d:1.5},{b:57.5,f:N.C5,d:0.5},{b:58,f:N.B4,d:1},{b:59,f:N.D5,d:1},
  {b:60,f:N.C5,d:2.5},{b:62.5,f:N.G4,d:1.5},
];
const SPB = 0.82;          // שנייה לפעימה (~73 BPM, איטי ורגשי)
const LOOP_BEATS = 64;     // 16 תיבות

function makeReverb(sec,decay){
  const rate=audioCtx.sampleRate, len=(rate*sec)|0, buf=audioCtx.createBuffer(2,len,rate);
  for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch); for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); } }
  const c=audioCtx.createConvolver(); c.buffer=buf; return c;
}

function initAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  master = audioCtx.createGain();
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=22; comp.ratio.value=3; comp.attack.value=0.004; comp.release.value=0.25;
  const makeup = audioCtx.createGain(); makeup.gain.value=1.35;
  master.connect(comp); comp.connect(makeup); makeup.connect(audioCtx.destination);
  master.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  master.gain.exponentialRampToValueAtTime(0.42, audioCtx.currentTime + 4); // כניסה רכה, נוכחת
  const rev=makeReverb(2.8,2.2), rg=audioCtx.createGain(); rg.gain.value=0.26;
  rev.connect(rg); rg.connect(master); reverbSend=rev;                        // ריברב אולם
  analyser=audioCtx.createAnalyser(); analyser.fftSize=1024; master.connect(analyser);
  waveData=new Float32Array(analyser.fftSize);
  loopStart = audioCtx.currentTime + 0.5;
  const _h = document.getElementById('musicHint'); if (_h) _h.classList.add('gone'); // החיווי נעלם משהתחיל
  scheduler();
}

// צליל פסנתר: הרמוניות מתכווצות + נגיעה פרקוסיבית + פילטר שמתעמעם
function piano(freq,start,dur,vel){
  const out=audioCtx.createGain(); out.gain.value=vel; out.connect(master); if(reverbSend) out.connect(reverbSend);
  const lp=audioCtx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(4600,start); lp.frequency.exponentialRampToValueAtTime(1300, start+Math.min(dur,2.4)*0.7);
  lp.connect(out);
  PARTIALS.forEach(p=>{
    const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=freq*p.m;
    const g=audioCtx.createGain(); const dd=Math.max(0.4,dur*p.d);
    g.gain.setValueAtTime(0.0001,start);
    g.gain.exponentialRampToValueAtTime(p.a, start+0.004);   // נקישת פטיש
    g.gain.exponentialRampToValueAtTime(0.0001, start+dd);   // דעיכה טבעית
    o.connect(g); g.connect(lp); o.start(start); o.stop(start+dd+0.1);
  });
}

// קולות מלאכיות — מקהלת "אה" אתרית (פורמנטים + ויברטו + ריברב)
const PAD = { C:[659.25,783.99], G:[493.88,587.33], Am:[523.25,659.25], F:[440.00,523.25] };
function choir(freq,start,dur,vel){
  const out=audioCtx.createGain();
  out.gain.setValueAtTime(0.0001,start);
  out.gain.exponentialRampToValueAtTime(vel, start+0.8);                    // כניסה רכה מאוד
  out.gain.setValueAtTime(vel, start+Math.max(0.9,dur-1.1));
  out.gain.exponentialRampToValueAtTime(0.0001, start+dur);                 // יציאה רכה
  const f1=audioCtx.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=800;  f1.Q.value=6;
  const f2=audioCtx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=1150; f2.Q.value=9;   // פורמנטים של "אה"
  f1.connect(out); f2.connect(out); out.connect(master); if(reverbSend) out.connect(reverbSend);
  const lfo=audioCtx.createOscillator(); lfo.frequency.value=5.2; const lg=audioCtx.createGain(); lg.gain.value=4; lfo.connect(lg); // ויברטו
  [-7,0,7].forEach(det=>{
    const o=audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.value=freq; o.detune.value=det;
    lg.connect(o.detune); o.connect(f1); o.connect(f2);
    o.start(start); o.stop(start+dur+0.2);
  });
  lfo.start(start); lfo.stop(start+dur+0.2);
}

function rnd(a,b){ return a+Math.random()*(b-a); }
function rpick(a){ return a[(Math.random()*a.length)|0]; }  // שם ייחודי — לא להתנגש עם pick() של השאלון

// ===== לחן שמימי בהשראת ENYA — פדים עשירים · מקהלת מלאכיות · נגיעות פסנתר צפות =====
const CH = {
  C:  {pad:[130.81,196.00,261.63,329.63,587.33], choir:[659.25,783.99], bell:[523.25,659.25,783.99]},
  Am: {pad:[110.00,164.81,220.00,261.63,493.88], choir:[523.25,659.25], bell:[440.00,523.25,659.25]},
  F:  {pad:[87.31,130.81,174.61,220.00,392.00],  choir:[440.00,523.25], bell:[523.25,698.46,440.00]},
  G:  {pad:[98.00,146.83,196.00,246.94,440.00],  choir:[493.88,587.33], bell:[587.33,392.00,493.88]},
};
const CHORDS2 = ['C','Am','F','G','Am','F','C','G'];
const HOLD = 7, OVER = 2.5;

// פד — גלי סינוס טהורים בלבד (חלק, לא צורם), שני קולות מעט מכוונים לחמימות
function pad(freq,start,dur,vel){
  [-4,4].forEach(det=>{
    const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=freq; o.detune.value=det;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.0001,start);
    g.gain.exponentialRampToValueAtTime(vel, start+2.2);                 // כניסה איטית
    g.gain.setValueAtTime(vel, start+Math.max(2.3,dur-3.2));
    g.gain.exponentialRampToValueAtTime(0.0001, start+dur);             // יציאה איטית → קרוספייד
    o.connect(g); g.connect(master); if(reverbSend) g.connect(reverbSend);
    o.start(start); o.stop(start+dur+0.3);
  });
}
// נגיעה צפה — פעמון סינוס רך (בלי הרמוניות = בלי צרימה)
function bell(freq,start,dur,vel){
  const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=freq;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.0001,start);
  g.gain.exponentialRampToValueAtTime(vel, start+0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
  o.connect(g); g.connect(master); if(reverbSend) g.connect(reverbSend);
  o.start(start); o.stop(start+dur+0.2);
}

function playPiece(t0){
  for (let i=0;i<CHORDS2.length;i++){
    const c=CH[CHORDS2[i]], t=t0 + i*HOLD;
    c.pad.forEach(f => pad(f, t, HOLD+OVER, 0.05));    // פד סינוס רך ומתמשך
    bell(rpick(c.bell), t + 2.8, 5.0, 0.08);            // נגיעה צפה
    if (Math.random()<0.5) bell(rpick(c.bell), t + 5.2, 4.0, 0.06);
  }
}

function scheduler(){
  if (!audioCtx || !musicOn) return;
  const loopDur = CHORDS2.length * HOLD;
  while (loopStart < audioCtx.currentTime + 2.0){   // מתזמן את המחזור הבא מראש
    playPiece(loopStart);
    loopStart += loopDur;
  }
  schedTimer = setTimeout(scheduler, 800);
}

function setMusic(on){
  musicOn = on;
  const btn = document.getElementById('musicBtn');
  if (on){
    btn.classList.add('on');
    if (!audioCtx){ initAudio(); }
    else { audioCtx.resume(); master.gain.exponentialRampToValueAtTime(0.42, audioCtx.currentTime + 1.5);
           if (!schedTimer){ loopStart = audioCtx.currentTime + 0.3; scheduler(); } }
  } else {
    btn.classList.remove('on');
    if (master){ master.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.0); }
    clearTimeout(schedTimer); schedTimer = null;
  }
}
function toggleMusic(){ setMusic(!musicOn); }

// התחלה בנגיעה ראשונה (הדפדפן דורש אינטראקציה לפני אודיו)
function firstGesture(){
  if (musicOn && !audioCtx){ initAudio(); }
  document.removeEventListener('click', firstGesture);
  document.removeEventListener('touchstart', firstGesture);
}
document.addEventListener('click', firstGesture);
document.addEventListener('touchstart', firstGesture);

// ===== פסי סאונד שזזים עם המוזיקה =====
const _cv=document.getElementById('musicWave'), _cx=_cv.getContext('2d');
const _BINS=[2,3,5,8,12,18], _barH=[.12,.12,.12,.12,.12,.12]; let _freq=null;
function drawWave(){
  requestAnimationFrame(drawWave);
  const w=_cv.width, h=_cv.height, n=_BINS.length;
  _cx.clearRect(0,0,w,h);
  _cx.fillStyle = musicOn ? '#171512' : '#9b958a';
  if (analyser && musicOn){ if(!_freq) _freq=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(_freq); }
  const bw = Math.max(2.5, w*0.028), gap=(w - n*bw)/(n+1); // דק ומינימליסטי
  for (let i=0;i<n;i++){
    let target = 0.10;
    if (analyser && musicOn && _freq) target = Math.max(0.10, Math.min(1, _freq[_BINS[i]]/205));
    _barH[i] += (target - _barH[i]) * 0.28;         // תנועה חלקה עם המוזיקה
    const bh = Math.max(3, _barH[i]*(h-8));
    const x = gap + i*(bw+gap), y=(h-bh)/2, r=Math.min(bw/2, bh/2);
    _cx.beginPath();
    if (_cx.roundRect) _cx.roundRect(x,y,bw,bh,r); else _cx.rect(x,y,bw,bh);
    _cx.fill();
  }
}
drawWave();

// אתחול — ברירת מחדל עברית
applyLang('he');
</script>
